<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E53935"/>
      <stop offset="100%" style="stop-color:#FF6B6B"/>
    </linearGradient>
  </defs>
  <!-- 背景圆 -->
  <circle cx="64" cy="64" r="60" fill="url(#grad)"/>
  <!-- 龙虾身体 -->
  <ellipse cx="64" cy="70" rx="28" ry="32" fill="#FFF"/>
  <!-- 龙虾头部 -->
  <ellipse cx="64" cy="42" rx="18" ry="14" fill="#FFF"/>
  <!-- 眼睛 -->
  <circle cx="56" cy="40" r="5" fill="#333"/>
  <circle cx="72" cy="40" r="5" fill="#333"/>
  <circle cx="57" cy="39" r="2" fill="#FFF"/>
  <circle cx="73" cy="39" r="2" fill="#FFF"/>
  <!-- 钳子 -->
  <ellipse cx="32" cy="55" rx="14" ry="10" fill="#FFF" transform="rotate(-20 32 55)"/>
  <ellipse cx="96" cy="55" rx="14" ry="10" fill="#FFF" transform="rotate(20 96 55)"/>
  <!-- AI 标记 -->
  <circle cx="64" cy="75" r="12" fill="url(#grad)"/>
  <text x="64" y="80" text-anchor="middle" fill="#FFF" font-size="14" font-weight="bold" font-family="Arial">AI</text>
</svg>