<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 320px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #FAFAFA;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    
    .logo {
      font-size: 28px;
    }
    
    .title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
    }
    
    .subtitle {
      font-size: 12px;
      color: #999;
      margin-top: 2px;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }
    
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #E0E0E0;
      border-radius: 6px;
      font-size: 13px;
      transition: border-color 0.2s;
    }
    
    input:focus {
      outline: none;
      border-color: #4A90D9;
    }
    
    button {
      width: 100%;
      padding: 10px;
      background: #4A90D9;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    button:hover {
      background: #357ABD;
    }
    
    .status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    
    .status.success {
      display: block;
      background: #E8F5E9;
      color: #2E7D32;
    }
    
    .status.error {
      display: block;
      background: #FFEBEE;
      color: #C62828;
    }
    
    .hint {
      margin-top: 16px;
      font-size: 11px;
      color: #999;
      line-height: 1.5;
    }
    
    .hint a {
      color: #4A90D9;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🦞</span>
    <div>
      <div class="title">FinView</div>
      <div class="subtitle">财经内容 AI 解读</div>
    </div>
  </div>
  
  <div class="form-group">
    <label for="apiKey">通义千问 API Key</label>
    <input type="text" id="apiKey" placeholder="sk-xxxxxxxxxxxxxxxx">
  </div>
  
  <button id="save">保存</button>
  
  <div class="status" id="status"></div>
  
  <div class="hint">
    获取 API Key：<a href="https://dashscope.console.aliyun.com/" target="_blank">阿里云 DashScope</a><br>
    仅在微博/雪球生效
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
